services:
  - type: web
    name: tripto-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
